<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Barbie's Closet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f8f1f2;
      color: #2d2d2d;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    img {
      display: block;
      width: 100%;
    }

    .topbar {
      background: #f3e9eb;
      text-align: center;
      padding: 14px;
    }

    .top-script {
      font-family: "Great Vibes", cursive;
      font-size: 22px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 34px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 22px;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .script {
      font-family: "Great Vibes", cursive;
      font-size: 44px;
    }

    .menu-btn,
    .icon-btn {
      width: 28px;
      height: 28px;
      color: #7a7475;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: none;
      border: none;
      flex-shrink: 0;
    }

    .menu-btn svg,
    .icon-btn svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .cart-icon {
      position: relative;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -10px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: #2d2d2d;
      color: white;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .cart-count.hidden {
      display: none;
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      opacity: 0;
      pointer-events: none;
      transition: 0.3s ease;
      z-index: 99;
    }

    .menu-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .side-menu {
      position: fixed;
      top: 0;
      left: -340px;
      width: 320px;
      max-width: 85%;
      height: 100vh;
      background: #f8f1f2;
      z-index: 100;
      transition: 0.3s ease;
      overflow-y: auto;
      border-right: 1px solid #e6dfe1;
    }

    .side-menu.open {
      left: 0;
    }

    .menu-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 24px;
      border-bottom: 1px solid #e6dfe1;
    }

    .menu-title {
      font-size: 24px;
      letter-spacing: 2px;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      color: #666;
    }

    .menu-links a {
      display: block;
      padding: 26px 24px;
      border-bottom: 1px solid #e6dfe1;
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .cart-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px 70px;
    }

    .breadcrumbs {
      font-size: 13px;
      color: #7a7475;
      margin-bottom: 24px;
    }

    .cart-title {
      font-size: 36px;
      font-weight: normal;
      letter-spacing: 1px;
      margin-bottom: 30px;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: 1.5fr 0.8fr;
      gap: 40px;
      align-items: start;
    }

    .cart-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 20px;
      background: white;
      border: 1px solid #e6dfe1;
      padding: 18px;
    }

    .cart-item-image img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #eee;
    }

    .cart-item-details {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }

    .cart-item-name {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .cart-item-meta {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
    }

    .cart-item-price {
      font-size: 18px;
      margin-top: 6px;
    }

    .cart-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .qty-btn {
      width: 36px;
      height: 36px;
      border: 1px solid #cfc4c7;
      background: #fff;
      font-size: 18px;
    }

    .qty-value {
      min-width: 32px;
      text-align: center;
      font-size: 15px;
    }

    .remove-btn {
      background: none;
      border: none;
      font-size: 14px;
      color: #8a5c6b;
      text-decoration: underline;
      padding: 0;
      margin-left: 6px;
    }

    .cart-summary {
      background: white;
      border: 1px solid #e6dfe1;
      padding: 24px;
      position: sticky;
      top: 20px;
    }

    .summary-title {
      font-size: 20px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      font-size: 15px;
      margin-bottom: 14px;
      color: #555;
    }

    .summary-total {
      border-top: 1px solid #e6dfe1;
      margin-top: 18px;
      padding-top: 18px;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .checkout-btn {
      width: 100%;
      margin-top: 24px;
      background: #2d2d2d;
      color: white;
      border: none;
      padding: 15px;
      letter-spacing: 2px;
      font-size: 14px;
    }

    .continue-link {
      display: inline-block;
      margin-top: 18px;
      font-size: 14px;
      color: #666;
      text-decoration: underline;
    }

    .empty-cart {
      background: white;
      border: 1px solid #e6dfe1;
      padding: 40px 24px;
      text-align: center;
    }

    .empty-cart h2 {
      font-size: 28px;
      font-weight: normal;
      margin-bottom: 12px;
    }

    .empty-cart p {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .shop-btn {
      display: inline-block;
      background: #2d2d2d;
      color: white;
      padding: 14px 24px;
      letter-spacing: 2px;
      font-size: 14px;
    }

    .footer {
      background: #f3e9eb;
      padding: 40px;
      text-align: center;
      margin-top: 40px;
    }

    .footer a {
      display: block;
      margin: 10px 0;
    }

    .copyright {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }

    @media (max-width: 900px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }

      .cart-summary {
        position: static;
      }
    }

    @media (max-width: 700px) {
      .header {
        padding: 20px;
      }

      .header-left,
      .header-right {
        gap: 12px;
      }

      .logo {
        font-size: 16px;
        letter-spacing: 1px;
      }

      .script {
        font-size: 30px;
      }

      .cart-title {
        font-size: 28px;
      }

      .cart-item {
        grid-template-columns: 1fr;
      }

      .cart-item-image img {
        height: 280px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <span class="top-script">Dress like a Princess</span>
  </div>

  <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

  <aside class="side-menu" id="sideMenu">
    <div class="menu-top">
      <div class="menu-title"><span class="script">Barbie’s</span> Closet</div>
      <button class="close-btn" onclick="closeMenu()">×</button>
    </div>

    <nav class="menu-links">
      <a href="dresses.html">Kjoler</a>
      <a href="coming.html">Coming Soon</a>
    </nav>
  </aside>

  <header class="header">
    <div class="header-left">
      <button class="menu-btn" onclick="openMenu()" aria-label="Open menu">
        <svg viewBox="0 0 24 24">
          <line x1="4" y1="7" x2="20" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="20" y2="17"></line>
        </svg>
      </button>

      <a href="index.html" class="logo">
        <span class="script">Barbie’s</span> Closet
      </a>
    </div>

    <div class="header-right">
      <a href="account.html" class="icon-btn" aria-label="Account">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c0-4 16-4 16 0"></path>
        </svg>
      </a>

      <a href="search.html" class="icon-btn" aria-label="Search">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="16" y1="16" x2="22" y2="22"></line>
        </svg>
      </a>

      <a href="cart.html" class="icon-btn cart-icon" aria-label="Cart">
        <svg viewBox="0 0 24 24">
          <path d="M6 7h12l-1 13H7L6 7z"></path>
        </svg>
        <span id="cartCount" class="cart-count hidden">0</span>
      </a>
    </div>
  </header>

  <main class="cart-page">
    <div class="breadcrumbs">
      <a href="index.html">Home</a> / Cart
    </div>

    <h1 class="cart-title">Your Cart</h1>

    <div id="cartContent"></div>
  </main>

  <footer class="footer">
    <a href="contact.html">Contact</a>
    <a href="terms.html">Terms & Conditions</a>
    <a href="shipping.html">Shipping</a>
    <a href="returns.html">Returns & Refunds</a>

    <div class="copyright">
      © 2026 Barbie's Closet
    </div>
  </footer>

  <script>
    function openMenu() {
      document.getElementById("sideMenu").classList.add("open");
      document.getElementById("menuOverlay").classList.add("show");
    }

    function closeMenu() {
      document.getElementById("sideMenu").classList.remove("open");
      document.getElementById("menuOverlay").classList.remove("show");
    }

    function getCart() {
      return JSON.parse(localStorage.getItem("cart")) || [];
    }

    function saveCart(cart) {
      localStorage.setItem("cart", JSON.stringify(cart));
    }

    function formatPrice(price) {
      return price + " NOK";
    }

    function updateCartCount() {
      const cart = getCart();
      const cartCount = document.getElementById("cartCount");
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

      cartCount.textContent = totalItems;

      if (totalItems === 0) {
        cartCount.classList.add("hidden");
      } else {
        cartCount.classList.remove("hidden");
      }
    }

    function renderCart() {
      const cart = getCart();
      const cartContent = document.getElementById("cartContent");

      if (cart.length === 0) {
        cartContent.innerHTML = `
          <div class="empty-cart">
            <h2>Your cart is empty</h2>
            <p>Add your favorite princess dresses to the cart and come back here.</p>
            <a href="dresses.html" class="shop-btn">SHOP DRESSES</a>
          </div>
        `;
        updateCartCount();
        return;
      }

      let itemsHTML = "";
      let subtotal = 0;

      cart.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        subtotal += itemTotal;

        itemsHTML += `
          <div class="cart-item">
            <div class="cart-item-image">
              <img src="${item.image}" alt="${item.name}">
            </div>

            <div class="cart-item-details">
              <div>
                <h2 class="cart-item-name">${item.name}</h2>
                <div class="cart-item-meta">
                  Size: ${item.size}<br>
                  Price: ${formatPrice(item.price)}
                </div>
                <div class="cart-item-price">
                  Item total: ${formatPrice(itemTotal)}
                </div>
              </div>

              <div class="cart-actions">
                <button class="qty-btn" onclick="decreaseQuantity(${index})">−</button>
                <span class="qty-value">${item.quantity}</span>
                <button class="qty-btn" onclick="increaseQuantity(${index})">+</button>
                <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
              </div>
            </div>
          </div>
        `;
      });

      const shipping = subtotal > 0 ? 49 : 0;
      const total = subtotal + shipping;

      cartContent.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items">
            ${itemsHTML}
          </div>

          <div class="cart-summary">
            <h2 class="summary-title">ORDER SUMMARY</h2>

            <div class="summary-row">
              <span>Subtotal</span>
              <span>${formatPrice(subtotal)}</span>
            </div>

            <div class="summary-row">
              <span>Shipping</span>
              <span>${formatPrice(shipping)}</span>
            </div>

            <div class="summary-total">
              <strong>Total</strong>
              <strong>${formatPrice(total)}</strong>
            </div>

            <button class="checkout-btn" onclick="checkout()">CHECKOUT</button>
            <a href="dresses.html" class="continue-link">Continue shopping</a>
          </div>
        </div>
      `;

      updateCartCount();
    }

    function increaseQuantity(index) {
      const cart = getCart();
      cart[index].quantity += 1;
      saveCart(cart);
      renderCart();
    }

    function decreaseQuantity(index) {
      const cart = getCart();

      if (cart[index].quantity > 1) {
        cart[index].quantity -= 1;
      } else {
        cart.splice(index, 1);
      }

      saveCart(cart);
      renderCart();
    }

    function removeItem(index) {
      const cart = getCart();
      cart.splice(index, 1);
      saveCart(cart);
      renderCart();
    }

    function checkout() {
      alert("Checkout will be added soon 💕");
    }

    renderCart();
  </script>

</body>
</html>
