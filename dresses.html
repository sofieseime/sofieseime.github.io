<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dresses | Barbie's Closet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f8f1f2;
      color: #2d2d2d;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      display: block;
      width: 100%;
    }

    .topbar {
      background: #f3e9eb;
      text-align: center;
      padding: 14px;
    }

    .top-script {
      font-family: "Great Vibes", cursive;
      font-size: 22px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 34px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 22px;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .script {
      font-family: "Great Vibes", cursive;
      font-size: 44px;
    }

    .menu-btn,
    .icon-btn {
      width: 28px;
      height: 28px;
      color: #7a7475;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: none;
      border: none;
    }

    .menu-btn svg,
    .icon-btn svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .cart-icon {
      position: relative;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -10px;
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #2d2d2d;
      color: white;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-count.hidden {
      display: none;
    }

    .page-header {
      text-align: center;
      padding: 25px 20px 10px;
    }

    .page-header h1 {
      font-size: 32px;
      letter-spacing: 6px;
      font-weight: normal;
    }

    .page-header p {
      margin-top: 10px;
      color: #6d6869;
      font-size: 14px;
    }

    .products {
      padding: 30px 15px 50px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .product-image img {
      height: 460px;
      object-fit: cover;
      background: #eee;
    }

    .product-info {
      text-align: center;
      margin-top: 10px;
    }

    .product-price {
      color: #5f5a5b;
      margin: 8px 0;
    }

    .btn {
      border: 2px solid #2d2d2d;
      padding: 10px 22px;
      font-size: 13px;
      letter-spacing: 2px;
      display: inline-block;
    }

    .footer {
      background: #f3e9eb;
      padding: 40px;
      text-align: center;
    }

    .footer a {
      display: block;
      margin: 10px 0;
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      opacity: 0;
      pointer-events: none;
    }

    .menu-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .side-menu {
      position: fixed;
      top: 0;
      left: -320px;
      width: 300px;
      height: 100vh;
      background: #f8f1f2;
      transition: 0.3s;
    }

    .side-menu.open {
      left: 0;
    }

    .menu-links a {
      display: block;
      padding: 20px;
      border-bottom: 1px solid #e6dfe1;
    }
  </style>
</head>

<body>

<div class="topbar">
  <span class="top-script">Dress like a Princess</span>
</div>

<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

<aside class="side-menu" id="sideMenu">
  <div style="padding:20px;">
    <strong>Menu</strong>
  </div>
  <nav class="menu-links">
    <a href="dresses.html">Dresses</a>
    <a href="coming.html">Coming Soon</a>
  </nav>
</aside>

<header class="header">
  <div class="header-left">
    <button class="menu-btn" onclick="openMenu()">☰</button>

    <a href="index.html" class="logo">
      <span class="script">Barbie’s</span> Closet
    </a>
  </div>

  <div class="header-right">
    <!-- ACCOUNT -->
    <a href="account.html" class="icon-btn">👤</a>

    <!-- CART -->
    <a href="cart.html" class="icon-btn cart-icon">
      🛒
      <span id="cartCount" class="cart-count hidden">0</span>
    </a>
  </div>
</header>

<section class="page-header">
  <h1>DRESSES</h1>
  <p>Princess styles for every occasion</p>
</section>

<section class="products">
  <div class="product-grid">

    <div>
      <div class="product-image">
        <img src="1.png">
      </div>
      <div class="product-info">
        <h2>Pink Princess Dress</h2>
        <div class="product-price">899 NOK</div>
        <a href="product1.html" class="btn">VIEW PRODUCT</a>
      </div>
    </div>

    <div>
      <div class="product-image">
        <img src="1.png">
      </div>
      <div class="product-info">
        <h2>White Dream Dress</h2>
        <div class="product-price">949 NOK</div>
        <a href="product2.html" class="btn">VIEW PRODUCT</a>
      </div>
    </div>

    <div>
      <div class="product-image">
        <img src="1.png">
      </div>
      <div class="product-info">
        <h2>Princess Evening Dress</h2>
        <div class="product-price">999 NOK</div>
        <a href="product3.html" class="btn">VIEW PRODUCT</a>
      </div>
    </div>

  </div>
</section>

<footer class="footer">
  <a href="contact.html">Contact</a>
  <a href="terms.html">Terms & Conditions</a>
  <a href="shipping.html">Shipping</a>
  <a href="returns.html">Returns & Refunds</a>
</footer>

<script>
function openMenu() {
  document.getElementById("sideMenu").classList.add("open");
  document.getElementById("menuOverlay").classList.add("show");
}

function closeMenu() {
  document.getElementById("sideMenu").classList.remove("open");
  document.getElementById("menuOverlay").classList.remove("show");
}

function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const count = cart.reduce((sum, item) => sum + item.quantity, 0);
  const el = document.getElementById("cartCount");

  el.textContent = count;
  el.classList.toggle("hidden", count === 0);
}

updateCartCount();
</script>

</body>
</html>
