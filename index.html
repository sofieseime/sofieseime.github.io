<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SÉI Studio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #fdf2f5; /* LYSE ROSA */
      color: #222;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .logo {
      letter-spacing: 3px;
      font-weight: bold;
    }

    .hero {
      height: 80vh;
      background: #f8e9ee;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 50px;
      margin-bottom: 15px;
    }

    .hero p {
      color: #666;
      margin-bottom: 20px;
    }

    .btn {
      background: black;
      color: white;
      padding: 12px 24px;
      text-decoration: none;
    }

    .section {
      padding: 60px 40px;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .product {
      background: white;
      padding: 15px;
    }

    .product img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    .footer {
      text-align: center;
      padding: 40px;
      font-size: 14px;
      color: #777;
    }

    @media(max-width: 800px){
      .products {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 32px;
      }
    }

  </style>
</head>

<body>

<header>
  <div class="logo">SÉI STUDIO</div>
  <div>Kjoler · Nyheter · Kontakt</div>
</header>

<section class="hero">
  <div>
    <h1>Feminine dresses for every moment</h1>
    <p>Simple, elegant and timeless pieces</p>
    <a href="#" class="btn">Shop now</a>
  </div>
</section>

<section class="section">
  <h2>Bestselgere</h2>

  <div class="products">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1515372039744-b8f02a3ae446" />
      <p>White Satin Dress</p>
      <p>799 kr</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1495385794356-15371f348c31" />
      <p>Black Elegant Dress</p>
      <p>899 kr</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b" />
      <p>Summer Dress</p>
      <p>749 kr</p>
    </div>

  </div>
</section>

<div class="footer">
  © 2026 SÉI Studio
</div>

</body>
</html>
