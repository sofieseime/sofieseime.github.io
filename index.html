<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbie's Closet</title>

  <!-- FONT (kun for Barbie) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f8f1f2;
      color: #2d2d2d;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      display: block;
      width: 100%;
    }

    .topbar {
      background: #f3e9eb;
      text-align: center;
      padding: 14px;
      font-size: 18px;
      letter-spacing: 2px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 34px;
    }

    .logo {
      font-size: 24px;
      letter-spacing: 2px;
    }

    .script {
      font-family: "Great Vibes", cursive;
      font-size: 42px;
    }

    .icon-group {
      display: flex;
      gap: 20px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      color: #7a7475;
    }

    .icon-btn svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.7;
    }

    .hero {
      min-height: 75vh;
      margin: 0 15px;
      background-image:
        linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
        url("1.png");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    .hero h1 {
      font-family: Arial, sans-serif;
      font-size: 55px;
      letter-spacing: 4px;
    }

    .categories {
      padding: 40px 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .card {
      position: relative;
      height: 500px;
    }

    .card img {
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .overlay h2 {
      font-size: 40px;
      margin-bottom: 20px;
      letter-spacing: 3px;
    }

    .btn {
      border: 2px solid white;
      padding: 10px 25px;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .footer {
      background: #f3e9eb;
      padding: 40px;
      text-align: center;
    }

    .footer a {
      display: block;
      margin: 10px 0;
    }

    .copyright {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }

    @media(max-width: 800px){
      .grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 32px;
      }
    }

  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="top-script">Dress like a Princess</span>
</div>

  
<!-- HEADER -->
<header class="header">
  <div class="logo">
    <span class="script">Barbie’s</span> Closet
  </div>

  <div class="icon-group">
    <div class="icon-btn">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 20c0-4 16-4 16 0"></path>
      </svg>
    </div>

    <div class="icon-btn">
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16" y1="16" x2="22" y2="22"></line>
      </svg>
    </div>

    <div class="icon-btn">
      <svg viewBox="0 0 24 24">
        <path d="M6 7h12l-1 13H7L6 7z"></path>
      </svg>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1></h1>
</section>

<!-- CATEGORIES -->
<section class="categories">
  <div class="grid">

    <div class="card">
      <img src="1.png">
      <div class="overlay">
        <h2>DRESSES</h2>
        <div class="btn">SHOP NOW</div>
      </div>
    </div>

    <div class="card">
      <img src="1.png">
      <div class="overlay">
        <h2>COMMING SOON</h2>
        <div class="btn">SHOP NOW</div>
      </div>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <a href="#">Contact</a>
  <a href="#">Terms & Conditions</a>
  <a href="#">Shipping</a>
  <a href="#">Returns & Refunds</a>

  <div class="copyright">
    © 2026 Barbie's Closet
  </div>
</footer>

</body>
</html>
