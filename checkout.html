<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Barbie's Closet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f8f1f2;
      color: #2d2d2d;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button,
    input,
    select {
      font-family: inherit;
    }

    button {
      cursor: pointer;
    }

    .topbar {
      background: #f3e9eb;
      text-align: center;
      padding: 14px;
    }

    .top-script {
      font-family: "Great Vibes", cursive;
      font-size: 22px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 34px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 22px;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .script {
      font-family: "Great Vibes", cursive;
      font-size: 44px;
    }

    .menu-btn,
    .icon-btn {
      width: 28px;
      height: 28px;
      color: #7a7475;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: none;
      border: none;
      flex-shrink: 0;
    }

    .menu-btn svg,
    .icon-btn svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .cart-icon {
      position: relative;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -10px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: #2d2d2d;
      color: white;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .cart-count.hidden {
      display: none;
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      opacity: 0;
      pointer-events: none;
      transition: 0.3s ease;
      z-index: 99;
    }

    .menu-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .side-menu {
      position: fixed;
      top: 0;
      left: -340px;
      width: 320px;
      max-width: 85%;
      height: 100vh;
      background: #f8f1f2;
      z-index: 100;
      transition: 0.3s ease;
      overflow-y: auto;
      border-right: 1px solid #e6dfe1;
    }

    .side-menu.open {
      left: 0;
    }

    .menu-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 24px;
      border-bottom: 1px solid #e6dfe1;
    }

    .menu-title {
      font-size: 24px;
      letter-spacing: 2px;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      color: #666;
    }

    .menu-links a {
      display: block;
      padding: 26px 24px;
      border-bottom: 1px solid #e6dfe1;
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .checkout-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px 70px;
    }

    .breadcrumbs {
      font-size: 13px;
      color: #7a7475;
      margin-bottom: 24px;
    }

    .checkout-title {
      font-size: 36px;
      font-weight: normal;
      letter-spacing: 1px;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    .checkout-layout {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 40px;
      align-items: start;
    }

    .checkout-form-box,
    .summary-box {
      background: white;
      border: 1px solid #e6dfe1;
      padding: 24px;
    }

    .section-title {
      font-size: 20px;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .sub-note {
      font-size: 14px;
      color: #777;
      margin-top: -8px;
      margin-bottom: 18px;
      line-height: 1.6;
    }

    .info-card {
      background: #fcf8f9;
      border: 1px solid #eadfe2;
      padding: 16px;
      margin-bottom: 22px;
      font-size: 14px;
      color: #5f5a5b;
      line-height: 1.7;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 8px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid #d8cdd0;
      background: white;
      padding: 14px;
      font-size: 14px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #bdaeb2;
    }

    .fake-card-box {
      border: 1px solid #e6dfe1;
      padding: 16px;
      background: #faf7f8;
      margin-top: 4px;
      border-radius: 2px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      color: #555;
    }

    .summary-item-name {
      max-width: 72%;
      line-height: 1.5;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      font-size: 15px;
      margin-top: 16px;
      color: #555;
    }

    .summary-total {
      border-top: 1px solid #e6dfe1;
      margin-top: 18px;
      padding-top: 18px;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .delivery-note {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid #e6dfe1;
      font-size: 14px;
      color: #666;
      line-height: 1.7;
    }

    .place-order-btn {
      width: 100%;
      margin-top: 26px;
      background: #2d2d2d;
      color: white;
      border: none;
      padding: 15px;
      letter-spacing: 2px;
      font-size: 14px;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      font-size: 14px;
      color: #666;
      text-decoration: underline;
    }

    .empty-checkout,
    .success-box {
      background: white;
      border: 1px solid #e6dfe1;
      padding: 40px 24px;
      text-align: center;
    }

    .empty-checkout h2,
    .success-box h2 {
      font-size: 28px;
      font-weight: normal;
      margin-bottom: 12px;
    }

    .empty-checkout p,
    .success-box p {
      color: #666;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .order-number {
      font-size: 14px;
      letter-spacing: 1px;
      color: #7a7475;
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    .action-btn {
      display: inline-block;
      background: #2d2d2d;
      color: white;
      padding: 14px 24px;
      letter-spacing: 2px;
      font-size: 14px;
      margin-top: 10px;
    }

    .footer {
      background: #f3e9eb;
      padding: 40px;
      text-align: center;
      margin-top: 40px;
    }

    .footer a {
      display: block;
      margin: 10px 0;
    }

    .copyright {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }

    @media (max-width: 900px) {
      .checkout-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .header {
        padding: 20px;
      }

      .header-left,
      .header-right {
        gap: 12px;
      }

      .logo {
        font-size: 16px;
        letter-spacing: 1px;
      }

      .script {
        font-size: 30px;
      }

      .checkout-title {
        font-size: 28px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <span class="top-script">Dress like a Princess</span>
  </div>

  <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

  <aside class="side-menu" id="sideMenu">
    <div class="menu-top">
      <div class="menu-title"><span class="script">Barbie’s</span> Closet</div>
      <button class="close-btn" onclick="closeMenu()">×</button>
    </div>

    <nav class="menu-links">
      <a href="dresses.html">Kjoler</a>
      <a href="coming.html">Coming Soon</a>
    </nav>
  </aside>

  <header class="header">
    <div class="header-left">
      <button class="menu-btn" onclick="openMenu()" aria-label="Open menu">
        <svg viewBox="0 0 24 24">
          <line x1="4" y1="7" x2="20" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="20" y2="17"></line>
        </svg>
      </button>

      <a href="index.html" class="logo">
        <span class="script">Barbie’s</span> Closet
      </a>
    </div>

    <div class="header-right">
      <a href="account.html" class="icon-btn" aria-label="Account">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c0-4 16-4 16 0"></path>
        </svg>
      </a>

      <a href="search.html" class="icon-btn" aria-label="Search">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="16" y1="16" x2="22" y2="22"></line>
        </svg>
      </a>

      <a href="cart.html" class="icon-btn cart-icon" aria-label="Cart">
        <svg viewBox="0 0 24 24">
          <path d="M6 7h12l-1 13H7L6 7z"></path>
        </svg>
        <span id="cartCount" class="cart-count hidden">0</span>
      </a>
    </div>
  </header>

  <main class="checkout-page">
    <div class="breadcrumbs">
      <a href="index.html">Home</a> / <a href="cart.html">Cart</a> / Checkout
    </div>

    <h1 class="checkout-title">Checkout</h1>

    <div id="checkoutContent"></div>
  </main>

  <footer class="footer">
    <a href="contact.html">Contact</a>
    <a href="terms.html">Terms & Conditions</a>
    <a href="shipping.html">Shipping</a>
    <a href="returns.html">Returns & Refunds</a>

    <div class="copyright">
      © 2026 Barbie's Closet
    </div>
  </footer>

  <script>
    function openMenu() {
      document.getElementById("sideMenu").classList.add("open");
      document.getElementById("menuOverlay").classList.add("show");
    }

    function closeMenu() {
      document.getElementById("sideMenu").classList.remove("open");
      document.getElementById("menuOverlay").classList.remove("show");
    }

    function getCart() {
      return JSON.parse(localStorage.getItem("cart")) || [];
    }

    function formatPrice(price) {
      return price + " NOK";
    }

    function updateCartCount() {
      const cart = getCart();
      const cartCount = document.getElementById("cartCount");
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

      cartCount.textContent = totalItems;

      if (totalItems === 0) {
        cartCount.classList.add("hidden");
      } else {
        cartCount.classList.remove("hidden");
      }
    }

    function generateOrderNumber() {
      const randomPart = Math.floor(100000 + Math.random() * 900000);
      return "BC-" + randomPart;
    }

    function renderCheckout() {
      const cart = getCart();
      const checkoutContent = document.getElementById("checkoutContent");

      if (cart.length === 0) {
        checkoutContent.innerHTML = `
          <div class="empty-checkout">
            <h2>Your cart is empty</h2>
            <p>Add something beautiful to your cart before checking out.</p>
            <a href="dresses.html" class="action-btn">SHOP DRESSES</a>
          </div>
        `;
        updateCartCount();
        return;
      }

      let itemsHTML = "";
      let subtotal = 0;

      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        subtotal += itemTotal;

        itemsHTML += `
          <div class="summary-item">
            <div class="summary-item-name">
              ${item.name} (${item.size}) × ${item.quantity}
            </div>
            <div>${formatPrice(itemTotal)}</div>
          </div>
        `;
      });

      const shipping = 49;
      const total = subtotal + shipping;

      checkoutContent.innerHTML = `
        <div class="checkout-layout">
          <div class="checkout-form-box">
            <h2 class="section-title">Customer Details</h2>
            <p class="sub-note">All dresses are preorder items.</p>

            <div class="info-card">
              <strong>Estimated delivery</strong><br>
              Up to 3 weeks for preorders
            </div>

            <form id="checkoutForm">
              <div class="form-row">
                <div class="form-group">
                  <label for="firstName">First Name</label>
                  <input type="text" id="firstName" required>
                </div>

                <div class="form-group">
                  <label for="lastName">Last Name</label>
                  <input type="text" id="lastName" required>
                </div>
              </div>

              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
              </div>

              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" required>
              </div>

              <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" required>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="postalCode">Postal Code</label>
                  <input type="text" id="postalCode" required>
                </div>

                <div class="form-group">
                  <label for="city">City</label>
                  <input type="text" id="city" required>
                </div>
              </div>

              <div class="form-group">
                <label for="country">Country</label>
                <select id="country" required>
                  <option value="">Select country</option>
                  <option value="Norway">Norway</option>
                  <option value="Sweden">Sweden</option>
                  <option value="Denmark">Denmark</option>
                  <option value="Portugal">Portugal</option>
                </select>
              </div>

              <h2 class="section-title" style="margin-top: 28px;">Payment Details</h2>

              <div class="fake-card-box">
                <div class="form-group">
                  <label for="cardName">Name on Card</label>
                  <input type="text" id="cardName" required>
                </div>

                <div class="form-group">
                  <label for="cardNumber">Card Number</label>
                  <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" required>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="expiry">Expiry Date</label>
                    <input type="text" id="expiry" placeholder="MM/YY" required>
                  </div>

                  <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" placeholder="123" required>
                  </div>
                </div>
              </div>

              <button type="submit" class="place-order-btn">PLACE ORDER</button>
              <a href="cart.html" class="back-link">Back to cart</a>
            </form>
          </div>

          <div class="summary-box">
            <h2 class="section-title">Order Summary</h2>

            ${itemsHTML}

            <div class="summary-row">
              <span>Subtotal</span>
              <span>${formatPrice(subtotal)}</span>
            </div>

            <div class="summary-row">
              <span>Shipping</span>
              <span>${formatPrice(shipping)}</span>
            </div>

            <div class="summary-total">
              <strong>Total</strong>
              <strong>${formatPrice(total)}</strong>
            </div>

            <div class="delivery-note">
              <strong>Estimated delivery</strong><br>
              Up to 3 weeks for preorders
            </div>
          </div>
        </div>
      `;

      document.getElementById("checkoutForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const orderNumber = generateOrderNumber();

        localStorage.removeItem("cart");
        updateCartCount();

        checkoutContent.innerHTML = `
          <div class="success-box">
            <div class="order-number">Order number: ${orderNumber}</div>
            <h2>Thank you for your order ♡</h2>
            <p>Your preorder has been placed successfully.</p>
            <p>Shipping: ${formatPrice(shipping)}</p>
            <p>Estimated delivery: up to 3 weeks</p>
            <a href="index.html" class="action-btn">BACK TO HOME</a>
          </div>
        `;
      });

      updateCartCount();
    }

    updateCartCount();
    renderCheckout();
  </script>

</body>
</html>
